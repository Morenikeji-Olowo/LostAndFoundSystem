<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items - Veritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .shadow-soft { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .shadow-soft-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
        .border-soft { border-color: #E5E7EB; }
        .status-active { background: #E8F5E9; color: #2E7D32; }
        .status-matched { background: #FFF3E0; color: #E65100; }
        .status-claimed { background: #E3F2FD; color: #1565C0; }
        .status-resolved { background: #F3E5F5; color: #6A1B9A; }
        .status-archived { background: #F5F5F5; color: #616161; }
        .custody-finder { background: #E8F5E9; color: #2E7D32; }
        .custody-frontdesk { background: #FFF3E0; color: #E65100; }
        .custody-returned { background: #E3F2FD; color: #1565C0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
<div class="max-w-6xl mx-auto px-4">
    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">My Reports</h1>
            <p class="text-gray-500 mt-1">Track and manage your lost & found items</p>
        </div>
        <a href="/items/report" class="px-6 py-2.5 bg-[#2D7A3E] text-white rounded-lg font-medium hover:bg-[#236632] transition shadow-soft">Report New Item</a>
    </div>

    <!-- Items Table -->
    <div th:if="${items != null && !items.empty}" class="bg-white rounded-xl shadow-soft overflow-hidden border border-gray-100">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 border-b border-gray-100">
                <tr>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Item</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Custody</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Reference</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                    <th class="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="item : ${items}" class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div th:if="${item.imageUrl}" class="w-10 h-10 rounded-lg bg-gray-100 overflow-hidden flex-shrink-0">
                                <img th:src="${item.imageUrl}" alt="" class="w-full h-full object-cover">
                            </div>
                            <div th:unless="${item.imageUrl}" class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 text-xs flex-shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <span class="font-medium text-gray-900" th:text="${item.name}">Item Name</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${item.type.name() == 'FOUND'}" class="px-2.5 py-1 bg-green-100 text-green-800 text-xs font-semibold rounded-full">Found</span>
                        <span th:if="${item.type.name() == 'LOST'}" class="px-2.5 py-1 bg-red-100 text-red-800 text-xs font-semibold rounded-full">Lost</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:class="'px-2.5 py-1 text-xs font-semibold rounded-full status-' + ${item.itemStatus.name().toLowerCase()}" th:text="${item.itemStatus.name()}">ACTIVE</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${item.type.name() == 'FOUND'}" th:class="'px-2.5 py-1 text-xs font-semibold rounded-full custody-' + ${item.custodyStatus.name().toLowerCase()}" th:text="${item.custodyStatus.name()}">WITH_FINDER</span>
                        <span th:if="${item.type.name() == 'LOST'}" class="text-gray-400 text-sm">—</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${item.referenceCode}">REF123</td>
                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${#temporals.format(item.dateReported, 'MMM dd, yyyy')}">Jan 01, 2024</td>
                    <td class="px-6 py-4 text-right">
                        <a th:href="'/items/' + ${item.id} + '/claims'" class="text-sm font-medium text-[#2D7A3E] hover:text-[#236632] transition">
                            Manage Claims →
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${items == null || items.empty}" class="text-center py-16 bg-white rounded-xl shadow-soft border border-gray-100">
        <div class="max-w-sm mx-auto">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">No items reported yet</h3>
            <p class="text-gray-500 mb-6">Start by reporting a lost or found item to help your community.</p>
            <a href="/items/report" class="px-6 py-2.5 bg-[#2D7A3E] text-white rounded-lg font-medium hover:bg-[#236632] transition shadow-soft inline-block">Report an Item</a>
        </div>
    </div>
</div>
</body>
</html>
