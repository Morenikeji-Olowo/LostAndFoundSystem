<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Veritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .shadow-soft { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .shadow-soft-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
        .border-soft { border-color: #E5E7EB; }
        .error-text { color: #DC2626; }
        .error-border { border-color: #DC2626; }
        input:focus { box-shadow: 0 0 0 3px rgba(45, 122, 62, 0.15); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">
<div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Veritas</h1>
        <p class="text-gray-500 mt-1">Lost & Found System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-soft p-8 border border-gray-100">
        <h2 class="text-2xl font-semibold text-gray-900 mb-2">Create New Password</h2>
        <p class="text-gray-500 text-sm mb-6">
            Choose a strong password for your account.
        </p>

        <!-- Global Error Slot -->
        <div th:if="${#fields.hasErrors('global')}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
            <ul>
                <li th:each="err : ${#fields.errors('global')}" th:text="${err}">Global error message</li>
            </ul>
        </div>

        <!-- Form -->
        <form th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post" class="space-y-6">

            <!-- Hidden Token -->
            <input type="hidden" th:field="*{token}" />

            <!-- New Password Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password <span class="text-red-500">*</span></label>
                <input type="password" th:field="*{newPassword}"
                       class="w-full rounded-lg border border-gray-200 px-4 py-2.5 focus:outline-none focus:border-[#2D7A3E] transition"
                       placeholder="Enter new password">
                <p class="text-xs text-gray-500 mt-1">At least 8 characters, 1 letter, 1 number</p>
                <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="error-text text-sm block mt-1"></span>
            </div>

            <!-- Confirm Password Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password <span class="text-red-500">*</span></label>
                <input type="password" th:field="*{confirmPassword}"
                       class="w-full rounded-lg border border-gray-200 px-4 py-2.5 focus:outline-none focus:border-[#2D7A3E] transition"
                       placeholder="Confirm new password">
                <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-text text-sm block mt-1"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full px-6 py-3 bg-[#2D7A3E] text-white rounded-lg font-medium hover:bg-[#236632] transition shadow-soft">
                Reset Password
            </button>
        </form>

        <!-- Back to Login -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Already have a password?
                <a href="/login" class="text-[#2D7A3E] font-medium hover:text-[#236632] transition">Log in</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <p class="text-xs text-gray-400 text-center mt-8">
        &copy; 2026 Veritas Lost & Found System
    </p>
</div>
</body>
</html>
