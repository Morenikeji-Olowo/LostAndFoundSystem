<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav class="sticky top-0 z-50 bg-white border-b border-findr-border h-16" th:fragment="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
        <div class="flex items-center justify-between h-full gap-4">
            <!-- Logo (clickable) -->
            <a href="/" class="flex items-center gap-2 shrink-0 hover:opacity-80 transition">
                <svg class="w-8 h-8 text-findr-primary" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 3a1 1 0 012 0v4a1 1 0 01-2 0V3zM6 8a2 2 0 00-2 2v3a2 2 0 002 2h8a2 2 0 002-2v-3a2 2 0 00-2-2H6z"/>
                    <path d="M4 14v3a2 2 0 002 2h8a2 2 0 002-2v-3H4z"/>
                </svg>
                <span class="font-poppins font-bold text-2xl text-findr-primary">Findr</span>
            </a>

            <!-- Desktop Nav Links -->
            <div class="hidden md:flex items-center gap-6">
                <a href="/" class="text-findr-text hover:text-findr-primary font-medium transition">Home</a>
                <a href="/browse" class="text-findr-text hover:text-findr-primary font-medium transition">Browse Items</a>
                <a href="/help" class="text-findr-text hover:text-findr-primary font-medium transition">Help Centre</a>
                <a href="/guidelines" class="text-findr-text hover:text-findr-primary font-medium transition">Pickup Guidelines</a>
            </div>

            <!-- ========== NOT LOGGED IN ========== -->
            <div th:if="${!isLoggedIn}" class="flex items-center gap-3">
                <a href="/login" class="text-findr-primary hover:text-findr-primary/80 font-semibold px-4 py-2 rounded-btn transition">
                    Login
                </a>
                <a href="/register" class="bg-findr-accent hover:bg-amber-600 text-white font-semibold px-5 py-2 rounded-btn transition shadow-sm">
                    Sign Up
                </a>
            </div>

            <!-- ========== LOGGED IN ========== -->
            <div th:if="${isLoggedIn}" class="flex items-center gap-4">
                <!-- User Avatar + Name + Role -->
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-findr-primary/10 rounded-full flex items-center justify-center ring-2 ring-findr-primary/20">
                        <span class="text-findr-primary font-semibold text-sm uppercase" th:text="${fullName != null ? fullName.substring(0,1) : 'U'}">U</span>
                    </div>
                    <div class="hidden sm:block">
                        <p class="text-sm font-semibold text-findr-text" th:text="${fullName}">User Name</p>
                        <p class="text-xs text-findr-muted" th:text="${role}">Student</p>
                    </div>
                </div>

                <!-- Dashboard Link -->
                <a href="/dashBoard" class="text-findr-primary hover:text-findr-primary/80 font-medium text-sm transition">
                    Dashboard
                </a>

                <!-- Logout Form -->
                <form action="/logout" method="post" class="inline">
                    <button type="submit" class="text-findr-muted hover:text-red-500 font-medium text-sm transition flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</html>
