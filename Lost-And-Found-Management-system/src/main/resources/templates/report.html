<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findr - Report Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'findr-primary': '#0D5C4A',
                        'findr-accent': '#F5A623',
                        'findr-surface': '#F7F8F6',
                        'findr-text': '#1A1A1A',
                        'findr-muted': '#6B7280',
                        'findr-border': '#E5E7EB',
                    },
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                        'roboto': ['Roboto', 'sans-serif'],
                    },
                    borderRadius: {
                        'card': '12px',
                        'btn': '8px',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-roboto text-findr-text bg-white">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-6">
        <h1 class="font-poppins font-bold text-3xl text-findr-text">Report an Item</h1>
        <p class="text-findr-muted mt-1">Help someone reunite with their belongings</p>
    </div>

    <!-- Global error -->
    <div th:if="${error}" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-btn text-red-600 text-sm"
         th:text="${error}"></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
        <button type="button" id="lostTab"
                th:classappend="${selectedType == 'FOUND'} ? 'bg-gray-100 text-findr-muted' : 'bg-findr-primary text-white'"
                class="report-tab flex-1 py-3 text-center font-semibold rounded-btn transition-all">
            I Lost Something
        </button>
        <button type="button" id="foundTab"
                th:classappend="${selectedType == 'FOUND'} ? 'bg-findr-primary text-white' : 'bg-gray-100 text-findr-muted hover:bg-gray-200'"
                class="report-tab flex-1 py-3 text-center font-semibold rounded-btn transition-all">
            I Found Something
        </button>
    </div>

    <!-- Form -->
    <form id="reportForm" action="/report" method="post" enctype="multipart/form-data"
          class="bg-white border border-findr-border rounded-card p-6 md:p-8 shadow-sm">

        <input type="hidden" id="reportType" name="type"
               th:value="${selectedType != null ? selectedType : 'LOST'}"/>

        <!-- Item Name -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2 text-sm">
                Item Name <span class="text-red-500">*</span>
            </label>
            <input type="text" id="itemName" name="name"
                   th:value="${item?.name}"
                   th:classappend="${nameError} ? 'border-red-400' : 'border-gray-200'"
                   class="w-full px-4 py-2.5 border rounded-btn focus:outline-none focus:border-findr-accent transition">
            <p th:if="${nameError}" th:text="${nameError}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <!-- Category -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2 text-sm">
                Category <span class="text-red-500">*</span>
            </label>
            <select id="category" name="category"
                    th:classappend="${categoryError} ? 'border-red-400' : 'border-gray-200'"
                    class="w-full px-4 py-2.5 border rounded-btn focus:outline-none focus:border-findr-accent transition bg-white">
                <option value="">Select a category</option>
                <option value="Electronics" th:selected="${item?.category == 'Electronics'}">Electronics</option>
                <option value="Bag"         th:selected="${item?.category == 'Bag'}">Bag</option>
                <option value="ID Card"     th:selected="${item?.category == 'ID Card'}">ID Card</option>
                <option value="Keys"        th:selected="${item?.category == 'Keys'}">Keys</option>
                <option value="Clothing"    th:selected="${item?.category == 'Clothing'}">Clothing</option>
                <option value="Other"       th:selected="${item?.category == 'Other'}">Other</option>
            </select>
            <p th:if="${categoryError}" th:text="${categoryError}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <!-- Description -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2 text-sm">
                Description <span class="text-red-500">*</span>
            </label>
            <textarea id="description" name="description" rows="4"
                      placeholder="Describe the item in detail (color, brand, distinguishing marks, etc.)"
                      th:classappend="${descError} ? 'border-red-400' : 'border-gray-200'"
                      class="w-full px-4 py-2.5 border rounded-btn focus:outline-none focus:border-findr-accent transition"
                      th:text="${item?.description}"></textarea>
            <p th:if="${descError}" th:text="${descError}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <!-- Date -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2 text-sm">
                Date <span class="text-red-500">*</span>
            </label>
            <input type="date" id="date" name="dateReported"
                   th:value="${item?.dateReported}"
                   th:classappend="${dateError} ? 'border-red-400' : 'border-gray-200'"
                   class="w-full px-4 py-2.5 border rounded-btn focus:outline-none focus:border-findr-accent transition">
            <p th:if="${dateError}" th:text="${dateError}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <!-- Location -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2 text-sm">
                Location <span class="text-red-500">*</span>
            </label>
            <input type="text" id="location" name="location"
                   placeholder="e.g., Library, Student Union, Cafeteria"
                   th:value="${item?.location}"
                   th:classappend="${locationError} ? 'border-red-400' : 'border-gray-200'"
                   class="w-full px-4 py-2.5 border rounded-btn focus:outline-none focus:border-findr-accent transition">
            <p th:if="${locationError}" th:text="${locationError}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <button type="submit"
                class="w-full bg-findr-accent hover:bg-amber-600 text-white font-semibold py-3 rounded-btn transition">
            Submit Report
        </button>
    </form>
</main>

<script>
    const lostTab = document.getElementById('lostTab');
    const foundTab = document.getElementById('foundTab');
    const reportType = document.getElementById('reportType');

    lostTab.addEventListener('click', () => {
        lostTab.classList.add('bg-findr-primary', 'text-white');
        lostTab.classList.remove('bg-gray-100', 'text-findr-muted', 'hover:bg-gray-200');
        foundTab.classList.add('bg-gray-100', 'text-findr-muted', 'hover:bg-gray-200');
        foundTab.classList.remove('bg-findr-primary', 'text-white');
        reportType.value = 'LOST';
    });

    foundTab.addEventListener('click', () => {
        foundTab.classList.add('bg-findr-primary', 'text-white');
        foundTab.classList.remove('bg-gray-100', 'text-findr-muted', 'hover:bg-gray-200');
        lostTab.classList.add('bg-gray-100', 'text-findr-muted', 'hover:bg-gray-200');
        lostTab.classList.remove('bg-findr-primary', 'text-white');
        reportType.value = 'FOUND';
    });
</script>

<footer class="bg-findr-surface border-t border-findr-border py-8 px-4 mt-12">
    <div class="max-w-7xl mx-auto text-center text-findr-muted text-sm">
        <p>&copy; 2024 Findr. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
